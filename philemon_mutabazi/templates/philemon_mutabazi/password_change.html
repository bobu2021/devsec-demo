{% extends "philemon_mutabazi/base.html" %}

{% block title %}Password Change{% endblock %}

{% block content %}
<h1>Password change</h1>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="form-row">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
        </div>
    {% endfor %}
    <button class="btn" type="submit">Update password</button>
</form>
{% endblock %}
